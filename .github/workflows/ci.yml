name: CI

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

concurrency:
  group: ci-${{github.ref}}
  cancel-in-progress: true

jobs:
  frontend-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24.x]

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run format
        run: pnpm run format

      - name: Run lint and fix
        run: pnpm run lint:fix

      - name: Type check
        run: pnpm run type-check

      - name: Build application
        run: pnpm run build

  frontend-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          cd frontend
          docker build -t training-frontend:test .

      - name: Test Docker container
        run: |
          docker run --rm -d --name frontend-test -p 5173:5173 training-frontend:test || true
          sleep 15
          timeout 10s curl -f http://localhost:5173 || echo "Frontend not ready, continuing..."
          docker stop frontend-test || true
          docker rm frontend-test || true

  backend-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [3.11, 3.12]

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 mypy pytest pytest-cov

      - name: Run code formatting
        run: black .

      - name: Run linting
        run: flake8 . || true

      - name: Run type checking
        run: mypy . || true

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: backend/coverage.xml
          flags: backend

  backend-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          cd backend
          docker build -t training-backend:test .

      - name: Test Docker container
        run: |
          docker run -d --name backend-test -p 8000:8000 training-backend:test || true
          sleep 15
          timeout 10s curl -f http://localhost:8000/docs || echo "Backend not ready, continuing..."
          docker stop backend-test || true
          docker rm backend-test || true
